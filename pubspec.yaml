name: medical_app
description: "Medical Store Management App"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.3.0

dependencies:
  flutter:
    sdk: flutter

  # UI
  cupertino_icons: ^1.0.8

  # Database
  sqflite: ^2.3.3
  sqflite_common_ffi: ^2.4.0+1
  sqflite_common: ^2.5.6
  path: ^1.9.1

  # Utilities
  intl: ^0.19.0
  shared_preferences: ^2.5.4
  file_picker: ^10.3.10
  excel: ^4.0.6
  share_plus: ^12.0.1
  open_file: ^3.5.11

  # Printing
  bluetooth_print: ^4.3.0
  esc_pos_utils_plus: ^2.0.4
  printing: ^5.14.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true